name: Deploy Auth Service

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pickfolio-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          set -euo pipefail
          PORT="${ORACLE_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/oracle.key
          chmod 600 ~/.ssh/oracle.key
          ssh-keyscan -p "$PORT" "$ORACLE_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host oracle-vm"
            echo "  HostName $ORACLE_HOST"
            echo "  Port $PORT"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
            echo "  IdentityFile ~/.ssh/oracle.key"
            echo "  ServerAliveInterval 30"
            echo "  ServerAliveCountMax 10"
          } >> ~/.ssh/config

      - name: Sync service to Oracle VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${ORACLE_PORT:-22}"
          APP_DIR="${ORACLE_APP_DIR:-/home/ubuntu/pickfolio}"
          REMOTE_DIR="${APP_DIR}/Backend/Auth Service"
          REMOTE_DIR_ESCAPED="$(printf '%q' "$REMOTE_DIR")"
          ssh -F "$HOME/.ssh/config" -l "$ORACLE_USER" oracle-vm "mkdir -p $REMOTE_DIR_ESCAPED"
          rsync -azs --delete \
            -e "ssh -F $HOME/.ssh/config -l ${ORACLE_USER}" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.gradle/' \
            --exclude '.idea/' \
            --exclude 'build/' \
            ./ "oracle-vm:${REMOTE_DIR}/"

      - name: Rebuild and restart auth-service
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${ORACLE_PORT:-22}"
          APP_DIR="${ORACLE_APP_DIR:-/home/ubuntu/pickfolio}"
          ssh -F "$HOME/.ssh/config" -l "$ORACLE_USER" oracle-vm "
            set -e
            cd '${APP_DIR}'
            export COMPOSE_BAKE=false
            if docker compose version >/dev/null 2>&1; then
              COMPOSE='docker compose'
            else
              COMPOSE='docker-compose'
            fi
            \$COMPOSE build auth-service
            \$COMPOSE up -d --no-deps auth-service
            \$COMPOSE restart pickfolio-ui
            docker image prune -f
          "
